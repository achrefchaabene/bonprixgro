<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonprix - Officiel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: #f9f9fb;
            color: #222222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border: 1px solid rgba(225, 26, 43, 0.15);
            border-radius: 28px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(225, 26, 43, 0.06), 0 0 25px rgba(0, 0, 0, 0.03);
        }

        .logo-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 25px;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(225, 26, 43, 0.15);
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            color: #e11a2b;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 13px;
            color: #666666;
            margin-bottom: 30px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 52px;
            padding: 15px 20px;
            color: #ffffff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            line-height: 1.25;
            border-radius: 14px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .btn:hover,
        .btn:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-fb-1 {
            background-color: #1877f2;
        }

        .btn-fb-2 {
            background-color: #3b5998;
        }

        .btn-insta {
            background: linear-gradient(45deg, #f09433, #dc2743, #bc1888);
        }

        .btn-tiktok {
            background-color: #000000;
        }

        .btn-maps {
            background-color: #ea4335;
        }

        .btn-wa {
            background-color: #25d366;
        }

        .footer {
            margin-top: 35px;
            font-size: 11px;
            color: #aaaaaa;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="logo-container">
            <img src="mah.jpg" alt="Logo Bonprix">
        </div>

        <h1>Bonprix</h1>
        <div class="tagline">Officiel</div>

        <div class="links-wrapper">
            <a href="https://www.facebook.com/share/1E7nhttV4X/?mibextid=wwXIfr" class="btn btn-fb-1" target="_blank" rel="noopener noreferrer">Page Facebook 1</a>
            <a href="https://www.facebook.com/share/1JtCeZ3CLT/?mibextid=wwXIfr" class="btn btn-fb-2" target="_blank" rel="noopener noreferrer">Page Facebook 2</a>
            <a href="https://www.instagram.com/bonprixgroigsh=MTRwbmVmZzg5MjBlNg%3D%3D&amp;utm_source=qr" class="btn btn-insta" target="_blank" rel="noopener noreferrer">Instagram (@bonprixgro)</a>
            <a href="https://www.tiktok.com/@mahdiagrbi?_r=1&amp;_t=ZS-97UVEMC1Bej" class="btn btn-tiktok" target="_blank" rel="noopener noreferrer">TikTok (@mahdiagrbi)</a>
            <a href="https://www.google.com/maps/search/?api=1&amp;query=35.415389,10.993167" class="btn btn-maps" target="_blank" rel="noopener noreferrer">📍 Notre Position (Google Maps)</a>
            <a href="https://wa.me/21694053663" class="btn btn-wa" target="_blank" rel="noopener noreferrer">Contact WhatsApp Direct</a>
        </div>

        <div class="footer">
            &copy; 2026 Bonprix. Tous droits réservés.
        </div>
    </main>
</body>
</html>
